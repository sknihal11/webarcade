<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Game | WebArcade</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Neon Cyberpunk Theme */
            --bg-primary: #050814;
            --bg-secondary: #0a0d20;
            --bg-tertiary: #131732;
            --bg-card: rgba(10, 13, 32, 0.4);
            --bg-glass: rgba(5, 8, 20, 0.6);

            --text-primary: #ffffff;
            --text-secondary: #aab8d2;

            /* Electric Cyan and Neon Pink Accents */
            --accent-primary: #00f0ff;
            --accent-secondary: #00b3ff;
            --accent-glow: rgba(0, 240, 255, 0.4);

            --success: #00ff9d;

            --border-medium: rgba(0, 240, 255, 0.2);
            --shadow-md: 0 4px 16px rgba(0, 240, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', 'Inter', sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-medium);
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(24px) saturate(150%);
            box-shadow: var(--shadow-md);
        }

        h2 {
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 0.75rem;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .btn {
            background: var(--accent-primary);
            color: #050814;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 800;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            width: 100%;
        }

        #authCheck {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .req-status {
            padding: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            border-radius: 6px;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }

        .past-requests {
            margin-top: 3rem;
            border-top: 1px solid var(--border-medium);
            padding-top: 2rem;
        }

        .req-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .req-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
            color: var(--accent-primary);
        }

        .req-status {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            display: inline-block;
            background: transparent;
            border: none;
            padding: 0;
        }

        .req-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .req-badge.replied {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .req-badge.pending {
            background: rgba(245, 158, 11, 0.2);
            color: #fcd34d;
        }

        .req-reply {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 240, 255, 0.05);
            border-left: 3px solid var(--accent-primary);
            border-radius: 4px;
        }

        .req-reply-title {
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--accent-primary);
            margin-bottom: 0.25rem;
        }
    </style>
</head>

<body>

    <div id="authCheck">Checking Authentication...</div>

    <div class="container">
        <h2 style="text-shadow: 0 0 10px var(--accent-glow)">Request a Game</h2>
        <p>Got a favorite game you want to see on WebArcade? Let us know!</p>

        <div class="req-status" id="successMsg">Your game request has been submitted!</div>

        <div class="form-group">
            <label>Game Title</label>
            <input type="text" id="gameTitle" placeholder="e.g. Pac-Man">
        </div>

        <div class="form-group">
            <label>Description (Optional)</label>
            <textarea id="gameDesc" rows="4"
                placeholder="Why should we add this game? Any specific version?"></textarea>
        </div>

        <button class="btn" id="submitBtn">Submit Request</button>
        <a href="blog.html" class="back-link">← Back to Dashboard</a>

        <div class="past-requests">
            <h3>My Past Requests</h3>
            <p style="margin-bottom: 1rem; font-size: 0.9rem;">Check the status of your game requests and replies from
                admins.</p>
            <div id="pastRequestsList">Loading your requests...</div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCzomf89xZhgcPsfYXKsYspCt-CiUVzjBA",
            authDomain: "webarcade-d4c3d.firebaseapp.com",
            projectId: "webarcade-d4c3d",
            storageBucket: "webarcade-d4c3d.firebasestorage.app",
            messagingSenderId: "918209461327",
            appId: "1:918209461327:web:bd9c1a2431f9b5c66ffe3a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        onAuthStateChanged(auth, user => {
            if (user) {
                currentUser = user;
                document.getElementById("authCheck").style.display = "none";
                loadMyRequests();
            } else {
                alert("You must be logged in to request a game.");
                window.location.href = "login.html";
            }
        });

        async function loadMyRequests() {
            const list = document.getElementById("pastRequestsList");
            list.innerHTML = "Loading your requests...";
            try {
                const q = query(
                    collection(db, "game_requests"),
                    where("uid", "==", currentUser.uid),
                    orderBy("createdAt", "desc")
                );
                const snap = await getDocs(q);

                list.innerHTML = "";
                if (snap.empty) {
                    list.innerHTML = "<p>You haven't made any requests yet.</p>";
                    return;
                }

                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const status = data.status || 'pending';
                    const date = data.createdAt ? data.createdAt.toDate().toLocaleDateString() : 'Unknown date';
                    const badgeClass = status === 'replied' ? 'replied' : 'pending';

                    let html = `
                        <div class="req-card">
                            <div class="req-title">${data.gameTitle}</div>
                            <div class="req-status">
                                <span class="req-badge ${badgeClass}">${status}</span> • ${date}
                            </div>
                            <p style="margin-bottom: 0; font-size: 0.95rem; color: #fff;">${data.description || 'No description provided.'}</p>
                    `;

                    if (status === 'replied' && data.replyText) {
                        html += `
                            <div class="req-reply">
                                <div class="req-reply-title">Admin Reply</div>
                                <div>${data.replyText}</div>
                            </div>
                        `;
                    }

                    html += `</div>`;
                    list.innerHTML += html;
                });
            } catch (error) {
                console.error("Error loading past requests:", error);

                // If index is missing, fallback to unordered query temporarily
                if (error.message.includes("index")) {
                    console.log("Falling back to un-ordered query due to missing index");
                    try {
                        const fallbackQ = query(collection(db, "game_requests"), where("uid", "==", currentUser.uid));
                        const snap = await getDocs(fallbackQ);
                        let requestsArray = [];
                        snap.forEach(d => requestsArray.push(d.data()));
                        // Sort locally
                        requestsArray.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                        list.innerHTML = "";
                        if (requestsArray.length === 0) list.innerHTML = "<p>You haven't made any requests yet.</p>";

                        requestsArray.forEach(data => {
                            const status = data.status || 'pending';
                            const date = data.createdAt ? data.createdAt.toDate().toLocaleDateString() : 'Unknown date';
                            const badgeClass = status === 'replied' ? 'replied' : 'pending';

                            let html = `
                                <div class="req-card">
                                    <div class="req-title">${data.gameTitle}</div>
                                    <div class="req-status">
                                        <span class="req-badge ${badgeClass}">${status}</span> • ${date}
                                    </div>
                                    <p style="margin-bottom: 0; font-size: 0.95rem; color: #fff;">${data.description || 'No description provided.'}</p>
                            `;

                            if (status === 'replied' && data.replyText) {
                                html += `
                                    <div class="req-reply">
                                        <div class="req-reply-title">Admin Reply</div>
                                        <div>${data.replyText}</div>
                                    </div>
                                `;
                            }

                            html += `</div>`;
                            list.innerHTML += html;
                        });
                    } catch (e2) {
                        list.innerHTML = "Failed to load requests.";
                    }
                } else {
                    list.innerHTML = "Failed to load requests.";
                }
            }
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            if (!currentUser) return;

            const title = document.getElementById('gameTitle').value.trim();
            const desc = document.getElementById('gameDesc').value.trim();

            if (!title) {
                alert('Please enter a game title.');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerText = "Submitting...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "game_requests"), {
                    uid: currentUser.uid,
                    username: currentUser.displayName || "Unknown",
                    email: currentUser.email || "Unknown",
                    gameTitle: title,
                    description: desc,
                    status: "pending",
                    createdAt: serverTimestamp()
                });

                document.getElementById('gameTitle').value = "";
                document.getElementById('gameDesc').value = "";
                document.getElementById('successMsg').style.display = "block";

                // Refresh the list immediately
                loadMyRequests();

                setTimeout(() => {
                    document.getElementById('successMsg').style.display = "none";
                }, 5000);

            } catch (error) {
                alert("Error submitting request: " + error.message);
            } finally {
                btn.innerText = "Submit Request";
                btn.disabled = false;
            }
        });
    </script>

</body>

</html>
