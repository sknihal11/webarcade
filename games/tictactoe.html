<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Tic-Tac-Toe - WebArcade</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.8);
            --p1-acc: #00f3ff;
            --p2-acc: #ff0055;
            --grid-line: rgba(255, 255, 255, 0.2);
            --text-main: #fff;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        .header {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
        }

        h1 {
            font-size: 32px;
            margin: 0;
            background: linear-gradient(90deg, var(--p1-acc), var(--p2-acc));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-board {
            display: flex;
            gap: 20px;
            align-items: center;
            background: var(--surface);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .status-player {
            padding: 5px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .status-player.active {
            transform: scale(1.1);
            box-shadow: 0 0 15px currentColor;
        }

        .p1 {
            color: var(--p1-acc);
        }

        .p2 {
            color: var(--p2-acc);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            background: var(--grid-line);
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 1;
        }

        .cell {
            background: var(--bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: 900;
            font-family: 'Courier New', Courier, monospace;
            transition: 0.2s;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
        }

        @media (max-width: 400px) {
            .cell {
                font-size: 60px;
            }
            .header h1 {
                font-size: 1.2rem;
            }
            .header a {
                font-size: 0.8rem;
            }
        }

        .cell:hover:not(.taken) {
            background: rgba(255, 255, 255, 0.05);
        }

        .cell:active:not(.taken) {
            transform: scale(0.95);
        }

        .cell.x {
            color: var(--p1-acc);
            text-shadow: 0 0 20px var(--p1-acc);
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cell.o {
            color: var(--p2-acc);
            text-shadow: 0 0 20px var(--p2-acc);
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .win-line {
            position: absolute;
            background: white;
            border-radius: 5px;
            transform-origin: left center;
            z-index: 10;
            box-shadow: 0 0 20px white;
            opacity: 0;
            transition: 0.5s;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .hidden {
            display: none !important;
        }

        .btn {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 10px;
            min-width: 250px;
        }

        .btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .btn-cyan {
            border-color: var(--p1-acc);
            color: var(--p1-acc);
        }

        .btn-cyan:hover {
            background: var(--p1-acc);
            color: black;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        .btn-pink {
            border-color: var(--p2-acc);
            color: var(--p2-acc);
        }

        .btn-pink:hover {
            background: var(--p2-acc);
            color: white;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
        }
    </style>
</head>

<body>

    <div class="header">
        <a href="../blog.html" style="color:var(--text-muted); text-decoration:none; font-weight:bold;">← DASHBOARD</a>
        <h1>TIC-TAC-TOE</h1>
    </div>

    <div class="status-board" id="statusBoard">
        <div class="status-player p1 active" id="p1Status">X: PLAYER 1</div>
        <div style="color:var(--text-muted);">VS</div>
        <div class="status-player p2" id="p2Status">O: CPU</div>
    </div>

    <div style="position: relative;">
        <div class="board" id="board">
            <div class="cell" data-idx="0"></div>
            <div class="cell" data-idx="1"></div>
            <div class="cell" data-idx="2"></div>
            <div class="cell" data-idx="3"></div>
            <div class="cell" data-idx="4"></div>
            <div class="cell" data-idx="5"></div>
            <div class="cell" data-idx="6"></div>
            <div class="cell" data-idx="7"></div>
            <div class="cell" data-idx="8"></div>
        </div>
        <div class="win-line" id="winLine"></div>
    </div>

    <!-- Mode Select -->
    <div id="startMenu" class="overlay">
        <h1 style="font-size: 50px; margin-bottom: 40px;">TIC-TAC-TOE</h1>
        <button class="btn btn-cyan" onclick="startGame('ai')">1 PLAYER (VS AI)</button>
        <button class="btn btn-pink" onclick="startGame('local')">2 PLAYER (LOCAL)</button>
        <button class="btn" style="border-color:#555; color:#aaa;" onclick="window.location.href='../blog.html'">BACK TO
            ARCADE</button>
    </div>

    <!-- Game Over Menu -->
    <div id="gameOverMenu" class="overlay hidden">
        <h1 id="winnerText" style="font-size: 60px; margin-bottom: 20px; text-shadow: 0 0 30px currentColor;">X WINS!
        </h1>


        <button class="btn btn-cyan" onclick="startGame(currentMode)">PLAY AGAIN</button>
        <button class="btn"
            onclick="document.getElementById('gameOverMenu').classList.add('hidden'); document.getElementById('startMenu').classList.remove('hidden');">MAIN
            MENU</button>
    </div>

    <script>
        const cells = document.querySelectorAll('.cell');
        const boardEl = document.getElementById('board');
        const winLine = document.getElementById('winLine');

        let board = Array(9).fill(null);
        let currentPlayer = 'X';
        let currentMode = 'ai'; // 'ai' or 'local'
        let isGameOver = false;

        const winPatterns = [[0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]];

        cells.forEach(cell => {
            cell.addEventListener('click', () => handleMove(cell.dataset.idx));
        });

        window.startGame = (mode) => {
            currentMode = mode;
            board = Array(9).fill(null);
            currentPlayer = 'X';
            isGameOver = false;

            cells.forEach(c => { c.innerText = ''; c.className = 'cell'; });
            winLine.style.opacity = '0';

            document.getElementById('p2Status').innerText = mode === 'ai' ? 'O: CPU' : 'O: PLAYER 2';
            updateTurnUI();

            document.getElementById('startMenu').classList.add('hidden');
            document.getElementById('gameOverMenu').classList.add('hidden');
        };

        function updateTurnUI() {
            document.getElementById('p1Status').classList.toggle('active', currentPlayer === 'X');
            document.getElementById('p2Status').classList.toggle('active', currentPlayer === 'O');
        }

        function handleMove(idx) {
            if (isGameOver || board[idx] || (currentMode === 'ai' && currentPlayer === 'O')) return;

            makePlay(idx, currentPlayer);

            if (!isGameOver && currentMode === 'ai') {
                setTimeout(makeCPUMove, 500); // Slight delay for realism
            }
        }

        function makePlay(idx, player) {
            board[idx] = player;
            const cell = cells[idx];
            cell.innerText = player;
            cell.classList.add('taken', player.toLowerCase());

            const winRes = checkWin(board);
            if (winRes) {
                endGame(winRes.winner, winRes.pattern);
            } else if (!board.includes(null)) {
                endGame('DRAW', null);
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                updateTurnUI();
            }
        }

        function checkWin(b) {
            for (let p of winPatterns) {
                if (b[p[0]] && b[p[0]] === b[p[1]] && b[p[0]] === b[p[2]]) return { winner: b[p[0]], pattern: p };
            }
            return null;
        }

        function drawWinLine(pattern) {
            const startCell = cells[pattern[0]];
            const endCell = cells[pattern[2]];

            const startRect = startCell.getBoundingClientRect();
            const endRect = endCell.getBoundingClientRect();
            const boardRect = boardEl.getBoundingClientRect();

            const x1 = startRect.left + startRect.width / 2 - boardRect.left;
            const y1 = startRect.top + startRect.height / 2 - boardRect.top;
            const x2 = endRect.left + endRect.width / 2 - boardRect.left;
            const y2 = endRect.top + endRect.height / 2 - boardRect.top;

            const length = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;

            winLine.style.width = `${length}px`;
            winLine.style.height = '10px';
            winLine.style.left = `${x1}px`;
            winLine.style.top = `${y1 - 5}px`;
            winLine.style.transform = `rotate(${angle}deg)`;

            winLine.style.background = currentPlayer === 'X' ? 'var(--p1-acc)' : 'var(--p2-acc)';
            winLine.style.boxShadow = `0 0 20px ${winLine.style.background}`;
            winLine.style.opacity = '1';
        }

        function endGame(winner, pattern) {
            isGameOver = true;
            document.getElementById('p1Status').classList.remove('active');
            document.getElementById('p2Status').classList.remove('active');

            if (pattern) drawWinLine(pattern);

            setTimeout(() => {
                const wt = document.getElementById('winnerText');
                if (winner === 'DRAW') {
                    wt.innerText = 'DRAW!';
                    wt.style.color = 'white';
                } else {
                    wt.innerText = `${winner} WINS!`;
                    wt.style.color = winner === 'X' ? 'var(--p1-acc)' : 'var(--p2-acc)';
                }
                document.getElementById('gameOverMenu').classList.remove('hidden');
            }, 1000);
        }

        // --- Minimax AI ---
        function makeCPUMove() {
            if (isGameOver) return;

            let bestScore = -Infinity;
            let move;

            // Random first move to vary gameplay
            if (board.every(c => c === null)) {
                move = Math.floor(Math.random() * 9);
            } else {
                for (let i = 0; i < 9; i++) {
                    if (board[i] === null) {
                        board[i] = 'O';
                        let score = minimax(board, 0, false);
                        board[i] = null;
                        if (score > bestScore) { bestScore = score; move = i; }
                    }
                }
            }
            if (move !== undefined) makePlay(move, 'O');
        }

        function minimax(b, depth, isMaximizing) {
            let res = checkWin(b);
            if (res) return res.winner === 'O' ? 10 - depth : depth - 10;
            if (!b.includes(null)) return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (b[i] === null) {
                        b[i] = 'O';
                        bestScore = Math.max(bestScore, minimax(b, depth + 1, false));
                        b[i] = null;
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (b[i] === null) {
                        b[i] = 'X';
                        bestScore = Math.min(bestScore, minimax(b, depth + 1, true));
                        b[i] = null;
                    }
                }
                return bestScore;
            }
        }
    </script>
</body>

</html>
