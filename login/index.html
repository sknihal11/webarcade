<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#040710">
  <title>Login | WebArcade</title>
</head>

<body style="margin:0;background:#040710;color:#f8fbff;font-family:Inter,Arial,sans-serif;display:grid;place-items:center;min-height:100vh;padding:24px;">
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const next = params.get("next");
      const recover = params.get("recover") === "1";
      const redirect = new URL("/", window.location.origin);
      redirect.searchParams.set("auth", recover ? "recover" : "login");
      if (next) {
        redirect.searchParams.set("next", next);
      }
      window.location.replace(redirect.toString());
    })();
  </script>

  <main style="max-width:420px;text-align:center;line-height:1.7;">
    <h1 style="font-family:Orbitron,Arial,sans-serif;">Redirecting to login...</h1>
    <p>If the popup does not open automatically, <a href="/?auth=login" style="color:#00f0ff;">return home</a>.</p>
  </main>
</body>

</html>
